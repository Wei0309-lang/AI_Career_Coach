services:
  - type: web
    name: ai-career-coach-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn Main:app --host 0.0.0.0 --port $PORT
    envVars:
      # --- 機密：需在 Render Dashboard 手動填入 ---
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: LIVEAVATAR_API_KEY
        sync: false
      - key: LIVEAVATAR_AVATAR_ID
        sync: false
      - key: LIVEAVATAR_CONTEXT_ID
        sync: false
      # --- 非機密：已填入生產環境預設值 ---
      - key: SUPABASE_URL
        value: https://bytjopnahjdpzlmwmeea.supabase.co
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: OLLAMA_MODEL
        value: my-career-coach
      - key: ALLOWED_ORIGINS
        value: https://ai-career-coach-gray-iota.vercel.app,https://cguimgraduatepj.me,https://www.cguimgraduatepj.me
      - key: OLLAMA_HOST
        sync: false
      - key: AZURE_SPEECH_REGION
        value: eastasia
      - key: AZURE_SPEECH_VOICE
        value: zh-TW-YunJheNeural
      - key: LIVEAVATAR_SANDBOX
        value: "1"
